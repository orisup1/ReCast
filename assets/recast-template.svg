<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ReCast menubar template">
  <!-- Template: solid black keycap with the two swap arrows knocked out, so
       macOS can tint it for light/dark menubars. White in the mask = kept,
       black in the mask = removed. -->
  <mask id="knockout" maskUnits="userSpaceOnUse" x="0" y="0" width="256" height="256">
    <rect x="32" y="24" width="192" height="184" rx="38" fill="#FFFFFF"/>
    <g stroke="#000000" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="96" y1="96" x2="172" y2="96"/>
      <polyline points="118,74 92,96 118,118"/>
      <line x1="84" y1="140" x2="160" y2="140"/>
      <polyline points="138,118 164,140 138,162"/>
    </g>
  </mask>
  <rect x="0" y="0" width="256" height="256" fill="#000000" mask="url(#knockout)"/>
</svg>
